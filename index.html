<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Zero Hour — Retro Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=IBM+Plex+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04090f;
    --panel: #081420;
    --teal: #2de2c6;
    --teal-soft: #9ff5e8;
    --teal-dim: #0fae97;
    --pink: #ff5a78;
    --amber: #ffc34d;
    --blue: #5aa7ff;
    --ink: #eaf6ff;
    --mono: "IBM Plex Mono", ui-monospace, Menlo, Consolas, monospace;
    --pixel: "Press Start 2P", var(--mono);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #02050a;
    color: var(--ink);
    font-family: var(--mono);
    overflow: hidden;
  }

  /* ---------- stage ---------- */
  #viewport { position: fixed; inset: 0; }
  #stage {
    position: absolute;
    left: 50%; top: 50%;
    width: 960px; height: 664px;
    transform: translate(-50%, -50%);
    transform-origin: center center;
  }
  #game-canvas {
    display: block;
    width: 960px; height: 600px;
    background: var(--bg);
    touch-action: none;
  }

  /* scanlines + vignette over the whole stage */
  #crt {
    position: absolute; inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px),
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.45) 100%);
    z-index: 30;
  }

  /* ---------- HUD ---------- */
  #hud {
    height: 64px;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 0 16px;
    background: var(--panel);
    border: 2px solid rgba(45,226,198,0.35);
    border-bottom: none;
    font-size: 14px;
    visibility: hidden;
  }
  .hud-block { display: flex; flex-direction: column; gap: 2px; }
  .hud-label { font-size: 9px; letter-spacing: 0.14em; color: rgba(159,245,232,0.5); }
  #hud-time {
    font-family: var(--pixel);
    font-size: 22px;
    color: var(--teal-soft);
    text-shadow: 0 0 12px rgba(45,226,198,0.7);
    min-width: 52px;
  }
  #hud-time.warn { color: var(--pink); text-shadow: 0 0 12px rgba(255,90,120,0.8); animation: blink 0.5s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0.35; } }
  #hud-score {
    font-family: var(--pixel);
    font-size: 18px;
    color: var(--ink);
    text-shadow: 0 0 10px rgba(45,226,198,0.5);
    min-width: 140px;
  }
  #hud-combo { font-weight: 700; font-size: 16px; color: var(--amber); min-width: 50px; text-shadow: 0 0 8px rgba(255,195,77,0.6); }
  #hud-hearts { color: var(--pink); font-size: 15px; letter-spacing: 0.1em; min-width: 60px; }
  #hud-hearts.low { animation: blink 0.7s steps(2) infinite; }
  #hud-pace { font-size: 13px; font-weight: 600; padding: 3px 8px; border: 1px solid; }
  #hud-pace.ahead { color: var(--teal); border-color: rgba(45,226,198,0.5); background: rgba(45,226,198,0.08); }
  #hud-pace.behind { color: var(--pink); border-color: rgba(255,90,120,0.5); background: rgba(255,90,120,0.08); }
  #hud-fx { display: flex; gap: 6px; flex: 1; justify-content: flex-end; flex-wrap: wrap; }
  .fx-chip {
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
    color: var(--c); border: 1px solid var(--c);
    padding: 3px 7px;
    text-shadow: 0 0 8px var(--c);
  }
  #hud-mode { font-size: 10px; letter-spacing: 0.12em; color: rgba(159,245,232,0.55); }

  /* ---------- screens ---------- */
  .screen {
    position: absolute;
    left: 0; top: 64px;
    width: 960px; height: 600px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    background: rgba(4,9,15,0.92);
    z-index: 20;
    text-align: center;
  }
  .screen.visible { display: flex; }

  .game-title {
    font-family: var(--pixel);
    font-size: 44px;
    color: var(--teal);
    text-shadow: 0 0 24px rgba(45,226,198,0.8), 0 0 60px rgba(45,226,198,0.35);
    letter-spacing: 0.04em;
  }
  .game-sub { font-size: 13px; letter-spacing: 0.22em; color: rgba(159,245,232,0.6); }
  .kr-sub { font-size: 12px; color: rgba(234,246,255,0.45); letter-spacing: 0.02em; }

  .mode-row { display: flex; gap: 18px; margin-top: 8px; }
  .mode-card {
    width: 280px;
    background: var(--panel);
    border: 2px solid rgba(45,226,198,0.4);
    padding: 20px 18px 16px 18px;
    cursor: pointer;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.12s, box-shadow 0.12s, transform 0.12s;
    font-family: var(--mono);
    color: var(--ink);
    text-align: center;
  }
  .mode-card:hover, .mode-card:focus-visible {
    border-color: var(--teal);
    box-shadow: 0 0 22px rgba(45,226,198,0.35), inset 0 0 18px rgba(45,226,198,0.08);
    transform: translateY(-2px);
    outline: none;
  }
  .mode-name { font-family: var(--pixel); font-size: 14px; color: var(--teal-soft); }
  .mode-desc { font-size: 12px; color: rgba(234,246,255,0.55); line-height: 1.5; }
  .mode-meta { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--amber); }
  #menu-date { font-size: 11px; color: rgba(159,245,232,0.5); letter-spacing: 0.1em; }

  .best-line { font-size: 12px; letter-spacing: 0.1em; color: rgba(159,245,232,0.65); }
  .controls-hint { font-size: 11px; letter-spacing: 0.1em; color: rgba(234,246,255,0.35); }

  /* ---------- game over ---------- */
  #over-mode { font-size: 11px; letter-spacing: 0.2em; color: rgba(159,245,232,0.55); }
  #over-reason { font-family: var(--pixel); font-size: 16px; color: var(--pink); text-shadow: 0 0 14px rgba(255,90,120,0.7); }
  #over-score {
    font-family: var(--pixel);
    font-size: 52px;
    color: var(--ink);
    text-shadow: 0 0 20px rgba(45,226,198,0.7);
  }
  #over-best-banner {
    display: none;
    font-family: var(--pixel);
    font-size: 16px;
    color: var(--amber);
    text-shadow: 0 0 18px rgba(255,195,77,0.9);
    animation: bestPop 0.45s cubic-bezier(0.2, 1.6, 0.4, 1) both, bestGlow 1.1s ease-in-out 0.45s infinite alternate;
  }
  #over-best-banner.show { display: block; }
  @keyframes bestPop { from { transform: scale(0.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes bestGlow { from { text-shadow: 0 0 10px rgba(255,195,77,0.6); } to { text-shadow: 0 0 26px rgba(255,195,77,1), 0 0 50px rgba(255,195,77,0.5); } }

  #over-stats { width: 320px; display: flex; flex-direction: column; gap: 6px; }
  .stat-row { display: flex; justify-content: space-between; font-size: 13px; border-bottom: 1px dashed rgba(45,226,198,0.18); padding-bottom: 5px; }
  .stat-k { color: rgba(159,245,232,0.55); letter-spacing: 0.08em; }
  .stat-v { color: var(--ink); font-weight: 600; }

  .btn-row { display: flex; gap: 12px; margin-top: 6px; }
  .arcade-btn {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--teal-soft);
    background: transparent;
    border: 2px solid rgba(45,226,198,0.5);
    padding: 12px 22px;
    cursor: pointer;
    transition: all 0.12s;
    min-height: 44px;
  }
  .arcade-btn:hover, .arcade-btn:focus-visible {
    border-color: var(--teal);
    background: rgba(45,226,198,0.1);
    box-shadow: 0 0 18px rgba(45,226,198,0.3);
    outline: none;
  }
  .arcade-btn.primary { background: rgba(45,226,198,0.14); border-color: var(--teal); }

  /* ---------- mute (outside scaled stage) ---------- */
  #btn-mute {
    position: fixed;
    top: 14px; right: 14px;
    z-index: 50;
    width: 44px; height: 44px;
    font-size: 19px;
    background: rgba(8,20,32,0.9);
    border: 2px solid rgba(45,226,198,0.4);
    color: var(--teal-soft);
    cursor: pointer;
    transition: all 0.12s;
  }
  #btn-mute:hover { border-color: var(--teal); box-shadow: 0 0 14px rgba(45,226,198,0.3); }

  /* ---------- touch joystick ---------- */
  #joystick {
    display: none;
    position: fixed;
    width: 110px; height: 110px;
    margin-left: -55px; margin-top: -55px;
    border: 2px solid rgba(45,226,198,0.35);
    border-radius: 50%;
    z-index: 40;
    pointer-events: none;
  }
  #joystick-knob {
    position: absolute;
    left: 50%; top: 50%;
    width: 46px; height: 46px;
    transform: translate(-50%, -50%);
    background: rgba(45,226,198,0.25);
    border: 2px solid var(--teal);
    border-radius: 50%;
    box-shadow: 0 0 16px rgba(45,226,198,0.5);
  }
</style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#04090f">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#04090f"></rect>
      <g transform="translate(600 380)">
        <path d="M0 -120 L80 75 L0 38 L-80 75 Z" fill="#0d2b33" stroke="#2de2c6" stroke-width="10"></path>
        <circle cx="0" cy="-22" r="20" fill="#9ff5e8"></circle>
      </g>
      <path d="M600 540 L622 575 L600 610 L578 575 Z" fill="#2de2c6"></path>
      <path d="M520 560 L536 585 L520 610 L504 585 Z" fill="#0fae97"></path>
      <path d="M680 560 L696 585 L680 610 L664 585 Z" fill="#0fae97"></path>
    </svg>
  </template>
  <div id="viewport">
    <div id="stage" data-screen-label="Game Arena">
      <div id="hud">
        <div class="hud-block">
          <span class="hud-label">TIME</span>
          <span id="hud-time">75</span>
        </div>
        <div class="hud-block">
          <span class="hud-label">SCORE</span>
          <span id="hud-score">0</span>
        </div>
        <div class="hud-block">
          <span class="hud-label">COMBO</span>
          <span id="hud-combo"></span>
        </div>
        <div class="hud-block">
          <span class="hud-label">HULL</span>
          <span id="hud-hearts">◆ ◆ ◆</span>
        </div>
        <span id="hud-pace" style="display: none;"></span>
        <div id="hud-fx"></div>
        <span id="hud-mode"></span>
      </div>

      <canvas id="game-canvas" width="960" height="600"></canvas>

      <div id="screen-menu" class="screen visible" data-screen-label="Main Menu">
        <div>
          <h1 class="game-title">ZERO HOUR</h1>
          <p class="game-sub" style="margin-top: 12px;">RETRO DRONE ARCADE · BEAT THE CORE WARDEN</p>
          <p class="kr-sub" style="margin-top: 6px;">75초 동안 크리스털을 모으고, 콤보를 쌓고, 보스를 깨세요</p>
        </div>
        <div class="mode-row">
          <button id="btn-daily" class="mode-card" type="button">
            <span class="mode-name">DAILY CHALLENGE</span>
            <span id="menu-date">—</span>
            <span class="mode-desc">Same seeded arena for everyone today.<br />오늘은 모두 같은 맵 — 점수로 승부</span>
            <span id="menu-daily-best" class="mode-meta">—</span>
          </button>
          <button id="btn-free" class="mode-card" type="button">
            <span class="mode-name">FREE PLAY</span>
            <span style="font-size: 11px; color: rgba(159,245,232,0.5); letter-spacing: 0.1em;">RANDOM SEED</span>
            <span class="mode-desc">A fresh random arena every run.<br />무작위 아레나로 무제한 연습</span>
            <span class="mode-meta" style="color: rgba(159,245,232,0.5);">PRACTICE MODE</span>
          </button>
        </div>
        <p id="menu-all-best" class="best-line">ALL-TIME BEST —</p>
        <p class="controls-hint">WASD / ARROWS — MOVE · FIRE IS AUTOMATIC · 모바일: 화면 드래그</p>
      </div>

      <div id="screen-over" class="screen" data-screen-label="Game Over">
        <span id="over-mode">DAILY</span>
        <span id="over-reason">TIME UP</span>
        <div>
          <p class="hud-label" style="font-size: 10px; margin-bottom: 8px;">FINAL SCORE</p>
          <p id="over-score">0</p>
        </div>
        <span id="over-best-banner"><span id="over-best-label">NEW BEST!</span> ★</span>
        <div id="over-stats"></div>
        <div class="btn-row">
          <button id="btn-retry" class="arcade-btn primary" type="button">RETRY</button>
          <button id="btn-share" class="arcade-btn" type="button">COPY RESULT</button>
          <button id="btn-menu" class="arcade-btn" type="button">MENU</button>
        </div>
        <p class="kr-sub">결과 복사에는 개인정보가 포함되지 않습니다</p>
      </div>

      <div id="crt"></div>
    </div>
  </div>

  <button id="btn-mute" type="button" aria-label="Mute">🔊</button>

  <div id="joystick">
    <div id="joystick-knob"></div>
  </div>

  <div id="tweaks-root"></div>

  <script src="js/store.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/game.js"></script>
  <script src="js/render.js"></script>
  <script src="js/main.js"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="js/tweaks-panel.jsx"></script>
  <script type="text/babel" src="js/tweaks.jsx"></script>
</body>
</html>
